[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# HashRouter handles routing on the client, but this ensures any direct URL loads index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
